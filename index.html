<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Residencial Aurora - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="tablet-container">
        <header class="main-header">
            <p>PLATAFORMA DE VIABILIDADE IMOBILIÁRIA</p>
            <h1>RESIDENCIAL AURORA - Fase 1</h1>
        </header>

        <div class="dashboard-grid">
            <section class="kpi-section">
                <div class="section-title">PRINCIPAIS INDICADORES</div>
                <div class="kpi-cards">
                    <div class="card">
                        <div class="card-header">VPL (Valor Presente Líquido)</div>
                        <div class="card-body">
                            <span class="value green">R$ 8.5M</span>
                            <canvas id="miniChartVPL" width="100" height="40"></canvas>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">TIR (Taxa Interna de Retorno)</div>
                        <div class="card-body">
                            <span class="value">22.1% <small>↗</small></span>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">MARGEM LÍQUIDA</div>
                        <div class="card-body">
                            <span class="value">18.5%</span>
                            <div class="gauge-placeholder"></div> </div>
                    </div>
                    <div class="card">
                        <div class="card-header">PAYBACK</div>
                        <div class="card-body">
                            <span class="value">32 MESES</span>
                            <div class="progress-bar"><div class="progress" style="width: 70%;"></div></div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="analysis-section">
                <div class="section-title">ANÁLISE DE CENÁRIOS</div>
                <div class="card scenarios-card">
                    <canvas id="scenariosChart"></canvas>
                </div>
            </section>

            <section class="cashflow-section">
                <div class="section-title">FLUXO DE CAIXA E CURVA S</div>
                <div class="card main-chart-card">
                    <canvas id="mainChart"></canvas>
                    <div class="footer-actions">
                        <button class="btn-pdf">GERAR RELATÓRIO PDF PARA COMITÊ</button>
                    </div>
                </div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
